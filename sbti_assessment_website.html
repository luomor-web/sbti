      { cat: "温室气体核算", text: "贵公司采用何种温室气体核算标准？", opts: ["GHG Protocol企业标准（含范围2指南）", "行业特定标准或地方标准", "自行制定的内部方法", "尚无明确核算标准"], scores: [4,3,2,1] },
      { cat: "温室气体核算", text: "贵公司供应链（范围3）温室气体数据的覆盖程度如何？", opts: ["覆盖15个以上范围3类别，数据质量高", "覆盖主要类别（占比>40%）", "仅覆盖1-2个关键类别", "尚未启动范围3核算"], scores: [4,3,2,1] },
      { cat: "目标设定", text: "贵公司是否已提交或承诺提交SBTi目标？", opts: ["已获SBTi官方批准的科学碳目标", "已提交SBTi审核中", "已签署承诺函（Commitment Letter）", "尚未开始SBTi申请流程"], scores: [4,3,2,1] },
      { cat: "目标设定", text: "贵公司近期减排目标（2030年前）对应哪种减排路径？", opts: ["1.5°C路径（年均减排4.2%以上）", "2°C路径（年均减排2.5%以上）", "有量化目标但路径未明确", "仅有定性承诺，无量化目标"], scores: [4,3,2,1] },
      { cat: "目标设定", text: "贵公司是否设定了长期净零目标？", opts: ["2050年前实现净零，含明确的中间里程碑", "有净零承诺但路径不清晰", "正在制定中", "尚未设定净零目标"], scores: [4,3,2,1] },
      { cat: "目标设定", text: "贵公司目标是否覆盖供应链减排？", opts: ["范围3目标覆盖67%以上采购和使用排放", "有范围3目标但覆盖率不足67%", "正在评估和制定中", "目标仅涵盖范围1和2"], scores: [4,3,2,1] },
      { cat: "减排行动", text: "贵公司在可再生能源使用方面的进展如何？", opts: ["可再生能源占比已超80%，或已签署RE100", "可再生能源占比30%-80%", "已启动可再生能源项目（占比<30%）", "尚未系统推进可再生能源转型"], scores: [4,3,2,1] },
      { cat: "减排行动", text: "贵公司是否制定了详细的减排行动计划（含预算和时间表）？", opts: ["有全面的行动计划，已纳入年度预算", "有初步计划，资源配置尚不明确", "正在开展减排路径规划", "尚无系统性减排行动计划"], scores: [4,3,2,1] },
      { cat: "减排行动", text: "贵公司如何处理无法直接减排的剩余碳排放？", opts: ["优先内部减排，仅对剩余量使用高质量碳移除", "使用碳信用额度但质量参差", "主要依赖碳信用抵消而非实质减排", "尚未制定相关策略"], scores: [4,3,2,1] },
      { cat: "减排行动", text: "贵公司是否向供应商传导气候行动要求？", opts: ["已向主要供应商提出明确的减排要求及时间节点", "正在开展供应商能力建设和意识提升", "偶尔在采购评估中涉及气候因素", "供应商管理中尚未纳入气候要求"], scores: [4,3,2,1] },
      { cat: "信息披露", text: "贵公司以何种方式披露气候相关信息？", opts: ["年度TCFD报告+CDP披露+ESG报告，经第三方鉴证", "发布ESG报告，部分参照TCFD框架", "仅有基础的可持续发展信息披露", "尚无系统性气候信息披露"], scores: [4,3,2,1] },
      { cat: "信息披露", text: "贵公司温室气体数据是否经过第三方鉴证？", opts: ["是，经有资质机构有限保证或合理保证鉴证", "正在安排首次第三方鉴证", "仅进行内部审核", "尚未开展任何形式的鉴证"], scores: [4,3,2,1] },
      { cat: "信息披露", text: "贵公司是否披露了气候相关的财务风险和机遇？", opts: ["按TCFD框架全面披露，含情景分析", "定性描述了主要气候风险", "仅提及气候相关的合规风险", "暂未披露气候财务影响"], scores: [4,3,2,1] },
      { cat: "信息披露", text: "贵公司是否定期追踪并公开报告目标达成进展？", opts: ["每年公开发布带有数据对比的进展报告", "内部定期追踪，对外披露有限", "有追踪机制但报告频率不固定", "尚未建立系统性进展追踪机制"], scores: [4,3,2,1] },
      { cat: "信息披露", text: "贵公司气候目标和行动是否与国家/行业减排路径保持一致？", opts: ["明确对标国家NDC或行业SBT路径", "参考了主要国际气候协议", "一致性分析仍在进行中", "尚未评估一致性"], scores: [4,3,2,1] }
    ];

    const catColors = { "治理架构": "#185FA5", "温室气体核算": "#0F6E56", "目标设定": "#993C1D", "减排行动": "#3B6D11", "信息披露": "#854F0B" };
    const catBg = { "治理架构": "#E6F1FB", "温室气体核算": "#E1F5EE", "目标设定": "#FAECE7", "减排行动": "#EAF3DE", "信息披露": "#FAEEDA" };

    let current = 0;
    let answers = new Array(20).fill(null);

    function startQuiz() {
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      renderQ();
    }

    function renderQ() {
      const q = questions[current];
      const categoryEl = document.getElementById('q-category');
      categoryEl.textContent = q.cat;
      categoryEl.style.background = catBg[q.cat];
      categoryEl.style.color = catColors[q.cat];
      categoryEl.style.borderColor = catColors[q.cat] + '44';
      document.getElementById('q-num').textContent = '第 ' + (current+1) + ' 题';
      document.getElementById('q-text').textContent = q.text;
      const pct = Math.round((current / 20) * 100);
      document.getElementById('progress-label').textContent = '第 ' + (current+1) + ' 题，共 20 题';
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';
      const optsEl = document.getElementById('q-options');
      optsEl.innerHTML = '';
      q.opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
        btn.innerHTML = '<div class="option-circle"><div class="option-dot"></div></div><span>' + opt + '</span>';
        btn.onclick = () => selectOpt(i);
        optsEl.appendChild(btn);
      });
      document.getElementById('btn-prev').style.display = current === 0 ? 'none' : '';
      document.getElementById('btn-next').disabled = answers[current] === null;
      document.getElementById('btn-next').textContent = current === 19 ? '查看结果 →' : '下一题 →';
    }

    function selectOpt(i) {
      answers[current] = i;
      document.querySelectorAll('.option-btn').forEach((b, idx) => {
        b.className = 'option-btn' + (idx === i ? ' selected' : '');
      });
      document.getElementById('btn-next').disabled = false;
    }

    function prevQ() { if (current > 0) { current--; renderQ(); } }
    function nextQ() {
      if (current < 19) { current++; renderQ(); }
      else showResult();
    }

    function showResult() {
      document.getElementById('quiz-screen').style.display = 'none';
      const cats = ["治理架构", "温室气体核算", "目标设定", "减排行动", "信息披露"];
      const catScores = {};
      cats.forEach(c => catScores[c] = { total: 0, max: 0 });
      questions.forEach((q, i) => {
        const ans = answers[i] !== null ? answers[i] : 3;
        catScores[q.cat].total += q.scores[ans];
        catScores[q.cat].max += 4;
      });
      let totalScore = 0, totalMax = 0;
      cats.forEach(c => { totalScore += catScores[c].total; totalMax += catScores[c].max; });
      const pct = Math.round((totalScore / totalMax) * 100);

      let level, levelColor, desc, recs;
      if (pct >= 80) {
        level = "领先级"; levelColor = "#0F6E56";
        desc = "贵公司在SBTi准备程度方面处于行业领先水平，已建立较为完善的气候治理体系和减排行动框架，具备申请SBTi目标批准的良好基础。";
        recs = [["加速推进", "完成SBTi官方提交并争取在12个月内获批"], ["深化供应链", "将范围3目标传导至核心供应商，建立协同减排机制"], ["引领披露", "发布TCFD对齐的气候财务报告，提升信息质量"]];
      } else if (pct >= 60) {
        level = "发展级"; levelColor = "#185FA5";
        desc = "贵公司已建立基础的气候管理能力，但在部分关键维度仍有明显提升空间。建议系统补足短板，加快SBTi目标制定进程。";
        recs = [["补强核算", "完善范围3温室气体盘查，提升数据覆盖率和质量"], ["制定路径", "启动符合1.5°C路径的量化减排目标设计"], ["强化治理", "将气候目标纳入高管KPI和董事会议程"]];
      } else if (pct >= 40) {
        level = "起步级"; levelColor = "#993C1D";
        desc = "贵公司尚处于气候行动的早期探索阶段，建议优先完成基础设施建设，包括完整的碳核算体系和正式的治理架构。";
        recs = [["建立基础", "优先完成范围1和2的GHG盘查并实施第三方验证"], ["确立治理", "设立气候/ESG委员会并明确高管责任分工"], ["签署承诺", "向SBTi提交承诺函，启动目标制定流程"]];
      } else {
        level = "预备级"; levelColor = "#854F0B";
        desc = "建议贵公司将建立气候行动基础能力列为近期优先事项，从碳排放核算和内部意识提升开始系统推进。";
        recs = [["意识提升", "开展全员气候意识培训，识别内部气候战略负责人"], ["启动盘查", "按照GHG Protocol标准，完成范围1和2的首次碳盘查"], ["了解框架", "深入学习SBTi标准要求，评估适用路径和时间表"]];
      }

      const dimBars = cats.map(c => {
        const p = Math.round((catScores[c].total / catScores[c].max) * 100);
        return `<div class="dim-card">
          <div class="dim-name">${c}</div>
          <div class="dim-bar-track"><div class="dim-bar-fill" style="width:${p}%; background:${catColors[c]};"></div></div>
          <div class="dim-score" style="color:${catColors[c]}">${p}%</div>
        </div>`;
      }).join('');

      const circumference = 2 * Math.PI * 55;
      const offset = circumference * (1 - pct / 100);

      const recItems = recs.map(([title, body], i) =>
        `<div class="rec-item"><div class="rec-icon" style="background:${catBg[cats[i]]};color:${catColors[cats[i]]}">${i+1}</div>
        <div class="rec-text"><strong>${title}</strong>：${body}</div></div>`
      ).join('');

      document.getElementById('result-screen').style.display = 'block';
      document.getElementById('result-screen').innerHTML = `
        <div class="result-wrap">
          <div class="score-ring">
            <svg viewBox="0 0 120 120" width="120" height="120">
              <circle cx="60" cy="60" r="55" fill="none" stroke="var(--color-background-secondary)" stroke-width="8"/>
              <circle cx="60" cy="60" r="55" fill="none" stroke="${levelColor}" stroke-width="8"
                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
                stroke-linecap="round" transform="rotate(-90 60 60)"/>
            </svg>
            <div class="score-text" style="color:${levelColor}">${pct}<span style="font-size:14px">%</span></div>
          </div>
          <div class="hero-badge" style="color:${levelColor};background:${Object.values(catBg)[cats.indexOf(cats[0])]}">${level}</div>
          <div class="result-title" style="margin-top:0.75rem">${level} — SBTi准备度 ${pct}%</div>
          <div class="result-subtitle">${desc}</div>
          <div class="dim-grid">${dimBars}</div>
          <div class="recommend-box">
            <h3>优先行动建议</h3>
            ${recItems}
          </div>
          <button class="btn-primary" onclick="restartQuiz()" style="margin-right:12px">重新评估</button>
          <button class="btn-ghost" onclick="sendPrompt('根据我的SBTi评估结果（${level}，${pct}%），请详细介绍下一步的具体行动方案')">获取详细建议 ↗</button>
        </div>`;
    }

    function restartQuiz() {
      current = 0; answers = new Array(20).fill(null);
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      renderQ();
    }

    function sendPrompt(prompt) {
      // 这里可以集成API调用，现在只是模拟
      alert('提示：此功能需要集成API才能实现');
    }
  </script>
