<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI 人格测试 - 开始测试 | 50道题目在线性格分析</title>
    <meta name="description" content="开始SBTI人格测试，回答50道题目，基于大五人格理论评估你的开放性、责任心、外向性、宜人性和神经质五大维度。10分钟完成，获得详细性格分析报告。">
    <meta name="keywords" content="SBTI, 人格测试, 开始测试, 大五人格, 性格测试, 心理测试, 开放性, 责任心, 外向性, 宜人性, 神经质, 在线测试">

    <meta property="og:type" content="website">

    <meta property="og:title" content="SBTI 人格测试 - 开始测试 | 50道题目在线性格分析">
    <meta property="og:description" content="开始SBTI人格测试，回答50道题目，基于大五人格理论评估你的开放性、责任心、外向性、宜人性和神经质五大维度。10分钟完成，获得详细性格分析报告。">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://yourdomain.com/sbti/v1/test.html">
    <meta property="twitter:title" content="SBTI 人格测试 - 开始测试 | 50道题目在线性格分析">
    <meta property="twitter:description" content="开始SBTI人格测试，回答50道题目，基于大五人格理论评估你的开放性、责任心、外向性、宜人性和神经质五大维度。10分钟完成，获得详细性格分析报告。">
    <meta property="twitter:image" content="https://picsum.photos/id/1005/600/400">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f8f9fa;
        }
        
        .progress-bar {
            transition: width 0.3s ease;
        }
        
        .option {
            transition: all 0.2s ease;
        }
        
        .option:hover {
            background-color: #f3f4f6;
        }
        
        .option.selected {
            background-color: #e6e7ff;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md fixed w-full z-10">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-lightbulb-o text-indigo-600 text-2xl"></i>
                <span class="text-xl font-bold text-gray-800">SBTI 人格测试</span>
            </div>
            <div class="hidden md:flex space-x-8">
                <a href="index.html" class="text-gray-600 hover:text-indigo-600 font-medium">首页</a>
                <a href="test.html" class="text-indigo-600 font-medium border-b-2 border-indigo-600">开始测试</a>
                <a href="about.html" class="text-gray-600 hover:text-indigo-600 font-medium">关于测试</a>
                <a href="contact.html" class="text-gray-600 hover:text-indigo-600 font-medium">联系我们</a>
            </div>
            <div class="md:hidden">
                <button class="text-gray-600 hover:text-indigo-600">
                    <i class="fa fa-bars text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 测试容器 -->
    <div class="container mx-auto px-4 pt-24 pb-16">
        <!-- 进度条 -->
        <div class="mb-10">
            <div class="flex justify-between mb-2">
                <span class="text-gray-600 font-medium">测试进度</span>
                <span class="text-indigo-600 font-bold" id="progress-text">1/50</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div class="bg-indigo-600 h-2.5 rounded-full progress-bar" style="width: 2%"></div>
            </div>
        </div>

        <!-- 测试题目 -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">测试题目</h2>
            
            <div class="mb-6">
                <h3 class="text-lg font-medium text-gray-700 mb-4" id="question-text">1. 我喜欢尝试新的事物和体验。</h3>
                
                <div class="space-y-3">
                    <div class="option p-4 border rounded-lg cursor-pointer" data-value="5">
                        <div class="flex items-center justify-between">
                            <span class="font-medium">非常同意</span>
                            <span class="text-gray-500">5</span>
                        </div>
                    </div>
                    <div class="option p-4 border rounded-lg cursor-pointer" data-value="4">
                        <div class="flex items-center justify-between">
                            <span class="font-medium">同意</span>
                            <span class="text-gray-500">4</span>
                        </div>
                    </div>
                    <div class="option p-4 border rounded-lg cursor-pointer" data-value="3">
                        <div class="flex items-center justify-between">
                            <span class="font-medium">中立</span>
                            <span class="text-gray-500">3</span>
                        </div>
                    </div>
                    <div class="option p-4 border rounded-lg cursor-pointer" data-value="2">
                        <div class="flex items-center justify-between">
                            <span class="font-medium">不同意</span>
                            <span class="text-gray-500">2</span>
                        </div>
                    </div>
                    <div class="option p-4 border rounded-lg cursor-pointer" data-value="1">
                        <div class="flex items-center justify-between">
                            <span class="font-medium">非常不同意</span>
                            <span class="text-gray-500">1</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="flex justify-between">
            <button id="prev-btn" class="bg-gray-200 text-gray-700 font-medium py-3 px-6 rounded-lg hover:bg-gray-300 transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                <i class="fa fa-arrow-left mr-2"></i> 上一题
            </button>
            <button id="next-btn" class="bg-indigo-600 text-white font-medium py-3 px-6 rounded-lg hover:bg-indigo-700 transition duration-300">
                下一题 <i class="fa fa-arrow-right ml-2"></i>
            </button>
        </div>
    </div>

    <!-- 提交确认模态框 -->
    <div id="submit-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full">
            <h3 class="text-xl font-bold text-gray-800 mb-4">确认提交</h3>
            <p class="text-gray-600 mb-6">
                你确定要提交测试吗？提交后将无法修改答案。
            </p>
            <div class="flex space-x-4 justify-end">
                <button id="cancel-submit" class="bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg hover:bg-gray-300 transition duration-300">
                    取消
                </button>
                <button id="confirm-submit" class="bg-indigo-600 text-white font-medium py-2 px-4 rounded-lg hover:bg-indigo-700 transition duration-300">
                    确认提交
                </button>
            </div>
        </div>
    </div>

    <script>
        // 测试题目数据
        const questions = [
            // 开放性 (Openness)
            { text: "1. 我喜欢尝试新的事物和体验。", dimension: "openness" },
            { text: "2. 我对艺术和美学有浓厚的兴趣。", dimension: "openness" },
            { text: "3. 我经常思考人生的意义和目的。", dimension: "openness" },
            { text: "4. 我喜欢学习新的知识和技能。", dimension: "openness" },
            { text: "5. 我对不同的文化和观点持开放态度。", dimension: "openness" },
            { text: "6. 我富有想象力和创造力。", dimension: "openness" },
            { text: "7. 我喜欢阅读和探索新的思想。", dimension: "openness" },
            { text: "8. 我对科学和技术的发展很感兴趣。", dimension: "openness" },
            { text: "9. 我喜欢尝试不同的音乐和艺术形式。", dimension: "openness" },
            { text: "10. 我经常有新的想法和创意。", dimension: "openness" },
            
            // 责任心 (Conscientiousness)
            { text: "11. 我是一个有条理和组织性的人。", dimension: "conscientiousness" },
            { text: "12. 我总是按时完成任务。", dimension: "conscientiousness" },
            { text: "13. 我对自己的工作和学习要求很高。", dimension: "conscientiousness" },
            { text: "14. 我喜欢制定计划并按照计划执行。", dimension: "conscientiousness" },
            { text: "15. 我是一个可靠和值得信赖的人。", dimension: "conscientiousness" },
            { text: "16. 我注重细节和精确度。", dimension: "conscientiousness" },
            { text: "17. 我有良好的自我控制能力。", dimension: "conscientiousness" },
            { text: "18. 我会为了长期目标而努力工作。", dimension: "conscientiousness" },
            { text: "19. 我是一个勤奋和努力的人。", dimension: "conscientiousness" },
            { text: "20. 我会认真对待自己的责任和义务。", dimension: "conscientiousness" },
            
            // 外向性 (Extraversion)
            { text: "21. 我喜欢参加社交活动和聚会。", dimension: "extraversion" },
            { text: "22. 我是一个活泼和充满活力的人。", dimension: "extraversion" },
            { text: "23. 我喜欢与他人交流和互动。", dimension: "extraversion" },
            { text: "24. 我在人群中感到舒适和自在。", dimension: "extraversion" },
            { text: "25. 我喜欢成为注意力的中心。", dimension: "extraversion" },
            { text: "26. 我是一个乐观和积极的人。", dimension: "extraversion" },
            { text: "27. 我喜欢冒险和刺激的活动。", dimension: "extraversion" },
            { text: "28. 我善于与人建立新的关系。", dimension: "extraversion" },
            { text: "29. 我是一个健谈和外向的人。", dimension: "extraversion" },
            { text: "30. 我喜欢与朋友共度时光。", dimension: "extraversion" },
            
            // 宜人性 (Agreeableness)
            { text: "31. 我是一个友善和乐于助人的人。", dimension: "agreeableness" },
            { text: "32. 我善于理解和同情他人。", dimension: "agreeableness" },
            { text: "33. 我喜欢与他人合作而不是竞争。", dimension: "agreeableness" },
            { text: "34. 我对他人的感受很敏感。", dimension: "agreeableness" },
            { text: "35. 我是一个宽容和包容的人。", dimension: "agreeableness" },
            { text: "36. 我愿意为他人着想和牺牲自己的利益。", dimension: "agreeableness" },
            { text: "37. 我善于解决冲突和化解矛盾。", dimension: "agreeableness" },
            { text: "38. 我对他人持信任态度。", dimension: "agreeableness" },
            { text: "39. 我是一个温和和亲切的人。", dimension: "agreeableness" },
            { text: "40. 我喜欢帮助他人并提供支持。", dimension: "agreeableness" },
            
            // 神经质 (Neuroticism)
            { text: "41. 我经常感到紧张和焦虑。", dimension: "neuroticism" },
            { text: "42. 我对批评和否定很敏感。", dimension: "neuroticism" },
            { text: "43. 我容易感到沮丧和情绪低落。", dimension: "neuroticism" },
            { text: "44. 我经常担心未来的事情。", dimension: "neuroticism" },
            { text: "45. 我对压力和挑战反应强烈。", dimension: "neuroticism" },
            { text: "46. 我容易感到愤怒和烦躁。", dimension: "neuroticism" },
            { text: "47. 我经常感到疲惫和精力不足。", dimension: "neuroticism" },
            { text: "48. 我对自己的能力缺乏信心。", dimension: "neuroticism" },
            { text: "49. 我容易感到孤独和孤立。", dimension: "neuroticism" },
            { text: "50. 我对生活中的变化感到不安。", dimension: "neuroticism" }
        ];

        // 当前问题索引
        let currentQuestionIndex = 0;
        // 存储答案
        const answers = {};

        // DOM 元素
        const questionText = document.getElementById('question-text');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.querySelector('.progress-bar');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const options = document.querySelectorAll('.option');
        const submitModal = document.getElementById('submit-modal');
        const cancelSubmit = document.getElementById('cancel-submit');
        const confirmSubmit = document.getElementById('confirm-submit');

        // 初始化测试
        function initTest() {
            loadQuestion(currentQuestionIndex);
            updateProgress();
        }

        // 加载问题
        function loadQuestion(index) {
            const question = questions[index];
            questionText.textContent = question.text;
            
            // 重置选项状态
            options.forEach(option => {
                option.classList.remove('selected');
            });
            
            // 如果有保存的答案，选中对应的选项
            if (answers[index]) {
                options.forEach(option => {
                    if (option.dataset.value === answers[index]) {
                        option.classList.add('selected');
                    }
                });
            }
            
            // 更新按钮状态
            updateButtons();
        }

        // 更新进度
        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;
            progressText.textContent = `${currentQuestionIndex + 1}/${questions.length}`;
        }

        // 更新按钮状态
        function updateButtons() {
            prevBtn.disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.textContent = '提交测试';
                nextBtn.innerHTML = '提交测试 <i class="fa fa-check ml-2"></i>';
            } else {
                nextBtn.textContent = '下一题';
                nextBtn.innerHTML = '下一题 <i class="fa fa-arrow-right ml-2"></i>';
            }
        }

        // 处理选项选择
        options.forEach(option => {
            option.addEventListener('click', function() {
                // 移除所有选项的选中状态
                options.forEach(opt => opt.classList.remove('selected'));
                // 选中当前选项
                this.classList.add('selected');
                // 保存答案
                answers[currentQuestionIndex] = this.dataset.value;
            });
        });

        // 上一题按钮
        prevBtn.addEventListener('click', function() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion(currentQuestionIndex);
                updateProgress();
            }
        });

        // 下一题按钮
        nextBtn.addEventListener('click', function() {
            // 检查是否选择了答案
            if (!answers[currentQuestionIndex]) {
                alert('请选择一个答案');
                return;
            }
            
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion(currentQuestionIndex);
                updateProgress();
            } else {
                // 显示提交确认模态框
                submitModal.classList.remove('hidden');
            }
        });

        // 取消提交
        cancelSubmit.addEventListener('click', function() {
            submitModal.classList.add('hidden');
        });

        // 确认提交
        confirmSubmit.addEventListener('click', function() {
            // 计算得分
            const scores = calculateScores();
            // 保存到本地存储
            localStorage.setItem('sbtitest_results', JSON.stringify(scores));
            // 跳转到结果页面
            window.location.href = 'results.html';
        });

        // 计算得分
        function calculateScores() {
            const scores = {
                openness: 0,
                conscientiousness: 0,
                extraversion: 0,
                agreeableness: 0,
                neuroticism: 0
            };
            
            questions.forEach((question, index) => {
                if (answers[index]) {
                    scores[question.dimension] += parseInt(answers[index]);
                }
            });
            
            return scores;
        }

        // 初始化测试
        initTest();
    </script>
</body>
</html>
